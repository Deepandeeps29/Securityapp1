<!DOCTYPE html>
<html>
<head>
    <title>Security Scanner</title>
</head>

<body style="background:black;color:white;text-align:center;padding-top:200px;">

<h1>SECURITY SCANNER</h1>

<input
    id="target"
    type="text"
    placeholder="Enter URL"
    style="width:400px;height:50px;font-size:20px;"
>

<br><br>

<button
    id="scanBtn"
    style="width:150px;height:50px;font-size:20px;"
>
    Search
</button>

<script>

document
.getElementById(
    "scanBtn"
)
.onclick =
function(){

    let target =
    document
    .getElementById(
        "target"
    )
    .value;

    if(!target){

        alert(
            "Enter URL"
        );

        return;
    }

    window.location.href =
        "/start_scan?target=" +
        encodeURIComponent(
            target
        );
};

</script>

</body>
</html>

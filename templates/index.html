<!DOCTYPE html>
<html>
<head>
    <title>Security Scanner</title>

    <style>

        body{
            background:#111;
            color:white;
            text-align:center;
            font-family:Arial;
            margin-top:150px;
        }

        input{
            width:400px;
            padding:15px;
            font-size:18px;
            border-radius:8px;
        }

        button{
            padding:15px 30px;
            margin-top:20px;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <h1>SECURITY SCANNER</h1>

    <form action="/scan" method="post">

        <input
            type="text"
            name="target"
            placeholder="Enter URL"
            required
        >

        <br>

        <button type="submit">
            Search
        </button>

    </form>

</body>
</html>
